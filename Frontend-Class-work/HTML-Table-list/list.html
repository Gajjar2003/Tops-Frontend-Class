<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List</title>
</head>

<body>
    <h1>Ordered list </h1>

    <ol>
        <li type="">Fruts</li>
        <ol type="1">
            <li>Mango</li>
            <li>Orange</li>
            <li>Banana</li>
        </ol>
        <li>Vegetabels</li>
        <ol type="I">
            <li>carrot</li>
            <li>potato</li>
        </ol>
    </ol>
    <hr>
    <hr>

    <h1>Unordered List</h1>
    <ul>
        <li>Fruts</li>
        <ul type="square">
            <li>Mango</li>
            <li>Orange</li>
            <li>Banana</li>
        </ul>
        <li>Vegetabels</li>
        <ul type="circle">
            <li>carrot</li>
            <li>potato</li>
        </ul>
    </ul>

    <hr>
    <hr>

    <h1>Description List</h1>
    <dl>
        <dt>Coffee</dt>
        <dd>- black hot drink</dd>
        <dt>Milk</dt>
        <dd>- white cold drink</dd>
    </dl>
</body>

</html>
