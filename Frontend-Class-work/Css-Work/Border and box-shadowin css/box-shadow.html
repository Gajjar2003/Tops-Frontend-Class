<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box-shadow</title>
    <style>
        .cart{
            height: 400px;
            width: 300px;
            margin: 25px;
           
            border-radius: 10px ;
            box-shadow: 5px 0px 5px 5px grey;
        }
            .cart1{
            height: 400px;
            width: 300px;
            margin: 25px;
           
            border-radius: 10px ;
            box-shadow: -5px 5px 5px 5px grey;
        }
    </style>
</head>
<body>
    <h1>Box-shadow Example</h1>
    <div class="cart">

    </div>
    <div class="cart1">

    </div>
</body>
</html>
