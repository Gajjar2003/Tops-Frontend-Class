<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Border</title>
    <style>
        .box {
            height: 200px;
            width: 200px;
            border: 2px solid black;
            margin: 25px;
        }

        #box1 {
            border: 5px solid rgb(243, 162, 162);
        }

        #box2 {
            border: 5px dashed rgb(141, 236, 141);
        }

        #box3 {
            border: 5px dotted rgb(122, 163, 228);
        }

        #box4 {
            border: 5px double rgb(227, 227, 131);

        }

        #box5 {

            border-radius: 15px;
             border: 5px solid rgb(231, 162, 66);
        }

        #box6 {
            border-radius: 50%;
             border: 5px solid rgb(243, 162, 162);
        }

        #box7 {
            border-radius: 0px 50px 0px 50px;
             border: 5px solid rgb(119, 236, 131);
        }

        #box8 {
            border-radius: 50px 0px 50px 0px;
             border: 5px solid rgb(133, 114, 239);
        }

        #box9 {
            border-radius: 50px 50px 50px 0px;
             border: 5px solid rgb(235, 105, 230);
        }
        #box10 {
            border-radius: 50px 50px 0px 50px;
             border: 5px solid rgb(207, 73, 146);

       
        }
    </style>
</head>

<body>
    <h1>Border Example</h1>
    <div class="box" id="box1"></div>
    <div class="box" id="box2"></div>
    <div class="box" id="box3"></div>
    <div class="box" id="box4"></div>
    <hr>
    <hr>
    <h1>Border-radius Example</h1>
    <div class="box" id="box5"></div>
    <div class="box" id="box6"></div>
    <div class="box" id="box7"></div>
    <div class="box" id="box8"></div>
    <div class="box" id="box9"></div>
    <div class="box" id="box10"></div>




</body>

</html>
