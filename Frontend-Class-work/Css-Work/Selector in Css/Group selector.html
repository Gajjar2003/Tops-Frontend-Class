<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group selector </title>
    <style>
        table th,td{
            border: 2px solid black;
        }
    </style>
</head>
<body>
    <!-- koi abhi elements ke group ko select karta hai -->
    <h1>Group selector(,)</h1>
    <table>
        <tr>
            <th>Hedaing1 1</th>
            <th>Hedaing1 2</th>
            <th>Hedaing1 3</th>
        </tr>
        <tr>
            <td>item1 1</td>
            <td>item1 2</td>
            <td>item1 3</td>
        </tr>
        <tr>
            <td>item1 1</td>
            <td>item1 2</td>
            <td>item1 3</td>
        </tr>
    </table>
</body>
</html>
