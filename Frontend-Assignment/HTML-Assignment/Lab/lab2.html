<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
</head>

<body>

    <h2>Contact Form</h2>

    <form action="#" method="post">

        <label for="fullname">Full Name:</label><br>
        <input type="text" id="fullname" name="fullname" required minlength="3" maxlength="30"
            placeholder="Enter your full name"><br><br>

        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" required placeholder="Enter your email"><br><br>

        <label for="phone">Phone Number:</label><br>
        <input type="tel" id="phone" name="phone" required pattern="[0-9]{10}"
            placeholder="Enter 10 digit phone number"><br><br>

        <label for="subject">Subject:</label><br>
        <select id="subject" name="subject" required>
            <option value="">--Select Subject--</option>
            <option value="support">Support</option>
            <option value="feedback">Feedback</option>
            <option value="inquiry">Inquiry</option>
        </select><br><br>

        <label for="message">Message:</label><br>
        <textarea id="message" name="message" required minlength="10" maxlength="200" rows="5" cols="30"
            placeholder="Enter your message"></textarea><br><br>

        <button type="submit">Submit</button>

    </form>

</body>

</html>
